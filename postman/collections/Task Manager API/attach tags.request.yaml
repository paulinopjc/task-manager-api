$kind: http-request
name: 'Attach tags to task'
method: POST
url: '{{base_url}}/tasks/:id/tags'
order: 9000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: id
    value: '{{task_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "tags": [1, 2]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Attach tags returns 200 or 204', function () {
        pm.expect(pm.response.code).to.be.oneOf([200,204]);
      });
