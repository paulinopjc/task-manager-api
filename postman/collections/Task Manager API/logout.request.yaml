$kind: http-request
name: 'Logout'
method: POST
url: '{{base_url}}/logout'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Logout returns 200 or 204', function () {
        pm.expect(pm.response.code).to.be.oneOf([200,204]);
      });
      // Clear token on successful logout
      if (pm.response.code === 200 || pm.response.code === 204) {
        pm.environment.unset('token');
      }
