$kind: http-request
name: 'Register'
method: POST
url: '{{base_url}}/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "test@example.com",
      "password": "password",
      "password_confirmation": "password"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Expect 201 Created and capture token if returned
      try {
        pm.test('Register returns 201 or 200', function () {
          pm.expect(pm.response.code).to.be.oneOf([200,201]);
        });
        var body = {};
        try { body = pm.response.json(); } catch (e) { body = {}; }
        var token = body.token || body.access_token || body.data && body.data.token;
        if (token) {
          pm.environment.set('token', token);
        }
      } catch(e) { console.log(e); }
