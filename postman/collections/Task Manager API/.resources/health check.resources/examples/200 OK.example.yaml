$kind: http-example
name: '200 OK'
request:
  url: 'http://localhost:8080/up'
  method: GET
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: text/html; charset=UTF-8
  body:
    type: html
    content: |-
      <!DOCTYPE html>
      <html>
        <head><title>OK</title></head>
        <body>Application up</body>
      </html>
order: 1000
