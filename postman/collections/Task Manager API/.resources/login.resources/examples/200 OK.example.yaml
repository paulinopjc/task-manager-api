$kind: http-example
name: '200 OK'
request:
  url: '{{base_url}}/login'
  method: POST
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "data": {
          "user": {
            "id": 1,
            "name": "Paulino Awino",
            "email": "paulino@example.com"
          },
          "token": "2|example_login_token"
        }
      }
order: 1000
